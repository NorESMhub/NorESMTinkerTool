res = ne16pg3_ne16pg3_mtn14
compset = NFLTHist
project = nn2345k
mach = betzy
walltime = 02:00:00

[env_run]
STOP_OPTION = nmonths
RUN_STARTDATE=2017-09-01
START_TOD       = 00000
STOP_N = 1
REST_N = 1
RUN_TYPE = startup
JOB_WALLCLOCK_TIME_RUN = 02:00:00
JOB_WALLCLOCK_TIME_ARCHIVE = 02:00:00
